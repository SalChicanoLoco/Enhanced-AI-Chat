<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enhanced AI Chat</title>
    <style>
      :root {
        --bg: #0b1020;
        --surface: #121a2b;
        --surface-2: #1a2339;
        --text: #edf2f7;
        --muted: #9aa4b2;
        --accent: #6ee7ff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: radial-gradient(circle at top, #16213f 0%, var(--bg) 40%);
        color: var(--text);
      }
      .shell {
        min-height: 100dvh;
        display: grid;
        grid-template-columns: 280px 1fr;
      }
      .sidebar {
        padding: 16px;
        background: color-mix(in oklab, var(--surface) 85%, black 15%);
        border-right: 1px solid #25304a;
      }
      .panel { background: var(--surface); border: 1px solid #25304a; border-radius: 12px; padding: 12px; margin-bottom: 12px; }
      .main { display: flex; flex-direction: column; padding: 16px; gap: 12px; }
      .chat-window { flex: 1; background: var(--surface); border: 1px solid #25304a; border-radius: 12px; padding: 12px; overflow-y: auto; }
      .msg { margin: 8px 0; padding: 10px 12px; border-radius: 12px; max-width: 85%; }
      .user { margin-left: auto; background: var(--surface-2); }
      .assistant { background: #16243c; border: 1px solid #2a3b5c; }
      .composer { display: grid; grid-template-columns: 1fr auto; gap: 8px; }
      input, select, button {
        width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #2f4268;
        background: var(--surface-2); color: var(--text);
      }
      button { background: var(--accent); color: #06222f; font-weight: 700; cursor: pointer; }
      .muted { color: var(--muted); font-size: 12px; }
      @media (max-width: 860px) {
        .shell { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="panel">
          <strong>Providers</strong>
          <p class="muted">Switch models/providers without app rewrites.</p>
          <select id="provider"></select>
          <input id="model" value="gpt-4.1" style="margin-top:8px" />
        </div>
        <div class="panel">
          <strong>Skins</strong>
          <p class="muted">Theme packs loaded from backend tokens.</p>
          <select id="theme"></select>
        </div>
      </aside>
      <main class="main">
        <div class="chat-window" id="messages">
          <div class="msg assistant">Welcome. This is your multi-provider chat skeleton.</div>
        </div>
        <div class="composer">
          <input id="prompt" placeholder="Ask something..." />
          <button id="send">Send</button>
        </div>
      </main>
    </div>
    <script>
      const providerSel = document.getElementById('provider');
      const themeSel = document.getElementById('theme');
      const modelInput = document.getElementById('model');
      const messages = document.getElementById('messages');
      const promptEl = document.getElementById('prompt');

      function add(role, text) {
        const d = document.createElement('div');
        d.className = `msg ${role}`;
        d.textContent = text;
        messages.appendChild(d);
        messages.scrollTop = messages.scrollHeight;
      }

      async function loadBootstrap() {
        const [providers, themes] = await Promise.all([
          fetch('/v1/providers').then(r => r.json()),
          fetch('/v1/themes').then(r => r.json())
        ]);
        providers.forEach(p => {
          const o = document.createElement('option');
          o.value = p.provider_id;
          o.textContent = p.display_name;
          providerSel.appendChild(o);
        });
        themes.forEach(t => {
          const o = document.createElement('option');
          o.value = t.name;
          o.textContent = t.name;
          o.dataset.tokens = JSON.stringify(t.tokens);
          themeSel.appendChild(o);
        });
        themeSel.onchange = () => {
          const tokens = JSON.parse(themeSel.selectedOptions[0].dataset.tokens || '{}');
          Object.entries(tokens).forEach(([k, v]) => document.documentElement.style.setProperty(`--${k}`, v));
        };
      }

      document.getElementById('send').onclick = async () => {
        const prompt = promptEl.value.trim();
        if (!prompt) return;
        add('user', prompt);
        promptEl.value = '';

        const payload = {
          session_id: 'demo-session',
          provider: providerSel.value,
          model: modelInput.value,
          messages: [{ role: 'user', content: prompt }]
        };

        const res = await fetch('/v1/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        }).then(r => r.json());

        add('assistant', res.output_text || 'No response');
      };

      loadBootstrap();
    </script>
  </body>
</html>
